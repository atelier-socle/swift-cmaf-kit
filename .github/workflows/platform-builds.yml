# platform-builds.yml — xcodebuild on every Apple platform simulator.
#
# Runs build + test on iOS, iPadOS, tvOS, watchOS, visionOS simulators
# against the CMAFKit library scheme. Per addendum F.1, the library scheme
# is `CMAFKit` (CamelCase) and the executable scheme is `CMAFKitCLI`.

name: Platform Builds

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: platforms-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apple-simulators:
    name: "xcodebuild (${{ matrix.platform }})"
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: "platform=iOS Simulator,name=iPhone 16 Pro"
          - platform: iPadOS
            destination: "platform=iOS Simulator,name=iPad Pro 13-inch (M4)"
          - platform: tvOS
            destination: "platform=tvOS Simulator,name=Apple TV 4K (3rd generation)"
          - platform: watchOS
            destination: "platform=watchOS Simulator,name=Apple Watch Series 10 (46mm)"
          - platform: visionOS
            destination: "platform=visionOS Simulator,name=Apple Vision Pro"
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Swift version
        run: swift --version

      - name: xcodebuild build (CMAFKit, ${{ matrix.platform }})
        run: |
          xcodebuild build \
            -scheme CMAFKit \
            -destination '${{ matrix.destination }}' \
            -derivedDataPath .derived \
            CODE_SIGNING_ALLOWED=NO

      - name: xcodebuild test (CMAFKit, ${{ matrix.platform }})
        run: |
          xcodebuild test \
            -scheme CMAFKit \
            -destination '${{ matrix.destination }}' \
            -derivedDataPath .derived \
            CODE_SIGNING_ALLOWED=NO
