# SwiftLint Configuration — swift-cmaf-kit
# Swift 6.2 strict concurrency library

# Paths to exclude
excluded:
  - .build
  - Tests/CMAFKitTests/Fixtures

# Enabled rules (opt-in)
opt_in_rules:
  - force_unwrapping
  - force_cast
  - force_try
  - vertical_whitespace
  - file_length
  - function_body_length
  - type_body_length
  - cyclomatic_complexity
  - nesting
  - todo

# Disabled rules
disabled_rules:
  - identifier_name
  - blanket_disable_command
  - trailing_whitespace
  - opening_brace
  - inclusive_language
  # Conflicts with swift-format's MultiElementCollectionTrailingCommas rule.
  - trailing_comma
  # `String(decoding: bytes, as: UTF8.self)` is idiomatic when the byte source
  # is known to be valid (FourCC ASCII, language-code packing, etc.).
  - optional_data_string_conversion
  # Codec bitstream parser inits (AV1 sequence header, HEVC SPS/PPS, AVC SPS)
  # carry many spec-mandated optional fields whose Swift representation maps
  # to `Optional` properties with default `nil`. Keeping the parameter order
  # aligned with the on-wire field order improves readability and matches the
  # standard's section ordering; the rule would force a less-natural shape.
  - function_default_parameter_at_end

# Rule configurations
line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

file_length:
  # AV1 sequence header OBU per AOMedia AV1 §5.5.1 and HEVC SPS per
  # ITU-T H.265 §7.3.2.2 are spec-mandated to expose dozens of fields with
  # dense bit-level packing; the resulting Swift types remain readable in a
  # single file but exceed the 500-line general baseline.
  warning: 700
  error: 1200
  ignore_comment_only_lines: true

function_body_length:
  # Exhaustive ICC element-type dispatch (29 standardised element types per
  # ICC.1:2022 §10), ICC profile header parsing (128-byte field-by-field
  # decode per §7.2), and AV1 sequence header parsing (~50 conditional
  # fields per AOMedia AV1 §5.5.1) legitimately exceed the 60-line baseline.
  warning: 220
  error: 240

type_body_length:
  # Codec bitstream parameter-set parsers (AVC SPS per ITU-T H.264 §7.3.2.1,
  # HEVC SPS/PPS/VUI/HRD per ITU-T H.265 §7.3.2.x / §E.2.x, AV1 sequence
  # header per AOMedia AV1 §5.5.1) carry dozens of spec-mandated fields and
  # bit-level conditional branches that benefit from co-location with the
  # type definition.
  warning: 400
  error: 600

cyclomatic_complexity:
  # Exhaustive enum switches against the 29-case ICC element-type taxonomy
  # (ICC.1:2022 §10) and 50-case ICC tag-signature taxonomy (Annex A)
  # legitimately exceed the 10-branch baseline.
  warning: 34
  error: 35

nesting:
  type_level: 2
  function_level: 3

vertical_whitespace:
  max_empty_lines: 2

# Allow the `_<Module>Placeholder` type pattern (one of these per module folder
# while the module is unimplemented). The leading underscore signals "internal,
# do not depend on this type — it's gone in a later session."
type_name:
  allowed_symbols: ['_']
  min_length: 3
  max_length: 60

# Allow 3-element tuples. ISO/IEC 14496-12 carries the RGB opcolor in `vmhd`
# as a 3-tuple; storing it as a tuple is the most direct mapping of the
# standard. Other 3-tuples (matrix triples) are similarly justified.
large_tuple:
  warning: 4
  error: 5
